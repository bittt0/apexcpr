<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Available Classes | Apex CPR Training</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --primary:#d62828;
    --dark:#0f172a;
    --bg:#f8fafc;
    --text:#0f172a;
    --muted:#64748b;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
}

/* NAV */
nav{
    background:white;
    padding:18px 0;
    box-shadow:0 2px 10px rgba(0,0,0,.06);
}

.container{
    width:min(1100px,90%);
    margin:auto;
}

.logo{
    font-size:1.5rem;
    font-weight:800;
    color:var(--primary);
}

/* HERO */
.hero{
    background:linear-gradient(rgba(15,23,42,.78),rgba(15,23,42,.78)),
    url("images/hero.png");
    background-size:cover;
    background-position:center;
    color:white;
    text-align:center;
    padding:90px 20px;
}

.hero h1{
    font-size:2.8rem;
    margin-bottom:10px;
}

.hero p{
    color:#cbd5e1;
}

/* SECTION */
section{
    padding:70px 0;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:22px;
}

/* CARD */
.card{
    background:white;
    border-radius:16px;
    padding:24px;
    box-shadow:0 10px 25px rgba(0,0,0,.06);
    transition:0.2s ease;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.card:hover{
    transform:translateY(-4px);
    box-shadow:0 18px 35px rgba(0,0,0,.1);
}

.card h3{
    color:var(--primary);
    font-size:1.2rem;
    margin-bottom:10px;
}

.meta{
    color:var(--muted);
    margin:6px 0;
    font-size:0.95rem;
}

.btn{
    margin-top:16px;
    display:inline-block;
    text-align:center;
    padding:12px 14px;
    background:var(--primary);
    color:white;
    border-radius:10px;
    text-decoration:none;
    font-weight:600;
    transition:0.2s;
}

.btn:hover{
    opacity:0.92;
    transform:translateY(-1px);
}

/* FOOTER LINK */
.back{
    display:inline-block;
    margin-top:30px;
    color:var(--primary);
    font-weight:600;
    text-decoration:none;
}
</style>
</head>

<body>

<nav>
<div class="container">
<div class="logo">Apex CPR Training</div>
</div>
</nav>

<div class="hero">
<h1>Available Class Sessions</h1>
<p>Choose a time that works for you</p>
</div>

<section>
<div class="container">

<div id="grid" class="grid"></div>

<a class="back" href="index.html">← Back to Home</a>

</div>
</section>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQH3XpNss-hIonvF_8GJ5c_ORTS33tCCQFfsPwyWnmdKAm_p0V0e4NlDgiGbmduXXc6RM2uG9FpnboF/pub?output=csv";

let data = [];

async function load(){
    const res = await fetch(SHEET_URL, { cache:"no-store" });
    const text = await res.text();

    const rows = text.trim().split("\n").slice(1);

    data = rows.map(r=>{
        const c = r.split(",").map(v=>v.replace(/"/g,'').trim());
        return {
            classType:c[0],
            date:c[1],
            time:c[2],
            location:c[3]
        };
    });

    render();
}

function render(){
    const grid = document.getElementById("grid");

    grid.innerHTML = data.map(d=>{
        const q = encodeURIComponent(`${d.classType} ${d.date} ${d.time}`);

        return `
        <div class="card">
            <h3>${d.classType}</h3>

            <div class="meta"><b>Date:</b> ${d.date}</div>
            <div class="meta"><b>Time:</b> ${d.time}</div>
            <div class="meta"><b>Location:</b> ${d.location}</div>

            <a class="btn" href="reserve.html?session=${q}">
                Reserve Spot
            </a>
        </div>
        `;
    }).join("");
}

load();

</script>

</body>
</html>
