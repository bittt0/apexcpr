<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Available Classes | Apex CPR Training</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:Inter,sans-serif;background:#f8fafc;margin:0}
.container{width:min(1100px,90%);margin:auto}

.hero{padding:80px 20px;text-align:center;background:#0f172a;color:white}
.hero h1{font-size:2.5rem}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-top:40px}

.card{background:white;padding:20px;border-radius:12px;box-shadow:0 10px 20px rgba(0,0,0,.08)}

.btn{display:inline-block;margin-top:15px;padding:10px 15px;background:#d62828;color:white;text-decoration:none;border-radius:8px}
</style>
</head>

<body>

<div class="hero">
<h1>Available Class Sessions</h1>
<p>Select a time below</p>
</div>

<div class="container">
<div id="grid" class="grid"></div>
</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQH3XpNss-hIonvF_8GJ5c_ORTS33tCCQFfsPwyWnmdKAm_p0V0e4NlDgiGbmduXXc6RM2uG9FpnboF/pub?output=csv";

async function load() {
    const res = await fetch(SHEET_URL, { cache: "no-store" });
    const text = await res.text();

    const rows = text.trim().split("\n").slice(1);

    const data = rows.map(r => {
        const cols = r.split(",").map(v => v.replace(/"/g,'').trim());
        return {
            classType: cols[0],
            date: cols[1],
            time: cols[2],
            location: cols[3]
        };
    });

    const grid = document.getElementById("grid");

    grid.innerHTML = data.map((d, i) => {
        const q = encodeURIComponent(`${d.classType} ${d.date} ${d.time}`);

        return `
        <div class="card">
            <h3>${d.classType}</h3>
            <p><b>Date:</b> ${d.date}</p>
            <p><b>Time:</b> ${d.time}</p>
            <p><b>Location:</b> ${d.location}</p>

            <a class="btn" href="reserve.html?session=${q}">
                Reserve Spot
            </a>
        </div>`;
    }).join("");
}

load();

</script>

</body>
</html>
