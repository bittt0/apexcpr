<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reserve Spot | Apex CPR Training</title>

<style>
body{
    font-family:Arial;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:30px;
    width:380px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input, select{
    width:100%;
    padding:10px;
    margin-top:10px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#d62828;
    color:white;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

small{
    display:block;
    margin-top:10px;
    color:#666;
}
</style>
</head>

<body>

<div class="box">

<h2>Reserve Your Spot</h2>

<form action="https://formsubmit.co/Apex.CPR.Training1@gmail.com" method="POST">

    <input type="hidden" name="_captcha" value="false">

    <input type="text" name="name" placeholder="Full Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="tel" name="phone" placeholder="Phone Number" required>

    <!-- NEW: class selector -->
    <select id="sessionSelect" required>
        <option value="">Loading available classes...</option>
    </select>

    <input type="text" id="classField" name="class" readonly>
    <input type="text" id="dateField" name="date" readonly>
    <input type="text" id="timeField" name="time" readonly>
    <input type="text" id="locationField" name="location" readonly>

    <button type="submit">Reserve Spot</button>

    <small>Select a class session above to auto-fill details.</small>

</form>

</div>

<script>

const SHEET_URL = "YOUR_PUBLISHED_CSV_LINK_HERE";

let scheduleData = [];

async function loadSchedule() {
    const res = await fetch(SHEET_URL);
    const text = await res.text();

    const rows = text.trim().split("\n").slice(1);

    scheduleData = rows.map(row => {
        const [title, date, time, location, classType] = row.split(",");
        return { title, date, time, location, classType };
    });

    populateDropdown();
}

function populateDropdown() {
    const select = document.getElementById("sessionSelect");

    select.innerHTML = `<option value="">Select a class session</option>`;

    scheduleData.forEach((item, index) => {
        const option = document.createElement("option");
        option.value = index;
        option.textContent = `${item.classType} — ${item.date} (${item.time})`;
        select.appendChild(option);
    });
}

document.getElementById("sessionSelect").addEventListener("change", function() {
    const item = scheduleData[this.value];

    if (!item) return;

    document.getElementById("classField").value = item.classType;
    document.getElementById("dateField").value = item.date;
    document.getElementById("timeField").value = item.time;
    document.getElementById("locationField").value = item.location;
});

loadSchedule();

</script>

</body>
</html>
