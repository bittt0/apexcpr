<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reserve Spot | Apex CPR Training</title>

<style>
body{
    font-family:Arial;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:30px;
    width:360px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#d62828;
    color:white;
    border:none;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="box">

<h2>Reserve Your Spot</h2>

<form action="https://formsubmit.co/Apex.CPR.Training1@gmail.com" method="POST">
    
    <input type="hidden" name="_token" value="754f3233f45d27d3ab4ce96e341073ee">
    <input type="hidden" name="_captcha" value="false">
    <input type="text" name="name" placeholder="Full Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="tel" name="phone" placeholder="Phone Number" required>

    <input type="text" id="classField" name="class" readonly>
    <input type="text" id="dateField" name="date" readonly>
    

    <button type="submit">Reserve Spot</button>

</form>

</div>

<script>
const params = new URLSearchParams(window.location.search);

document.getElementById("classField").value = params.get("class") || "Not selected";
document.getElementById("dateField").value = params.get("date") || "Not selected";
</script>

</body>
</html>
