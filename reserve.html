<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reserve Spot | Apex CPR Training</title>

<style>
body{
    font-family:Arial;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:30px;
    width:400px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input, select{
    width:100%;
    padding:10px;
    margin-top:10px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#d62828;
    color:white;
    border:none;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="box">

<h2>Reserve Your Spot</h2>

<form action="https://formsubmit.co/Apex.CPR.Training1@gmail.com" method="POST">
<input type="hidden" name="_captcha" value="false">

<input type="text" name="name" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email" required>
<input type="tel" name="phone" placeholder="Phone Number" required>

<select id="sessions"></select>

<input type="text" name="class" id="classField" readonly>
<input type="text" name="date" id="dateField" readonly>
<input type="text" name="time" id="timeField" readonly>
<input type="text" name="location" id="locationField" readonly>

<button type="submit">Reserve Spot</button>
</form>

</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQH3XpNss-hIonvF_8GJ5c_ORTS33tCCQFfsPwyWnmdKAm_p0V0e4NlDgiGbmduXXc6RM2uG9FpnboF/pub?output=csv";

let data = [];

async function load() {
    const res = await fetch(SHEET_URL, { cache: "no-store" });
    const text = await res.text();

    const rows = text.trim().split("\n").slice(1);

    data = rows.map(r => {
        const c = r.split(",").map(v => v.replace(/"/g,'').trim());
        return {
            classType: c[0],
            date: c[1],
            time: c[2],
            location: c[3]
        };
    });

    const select = document.getElementById("sessions");

    select.innerHTML = "<option value=''>Select a session</option>";

    data.forEach((d,i)=>{
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = `${d.classType} — ${d.date} (${d.time})`;
        select.appendChild(opt);
    });
}

document.getElementById("sessions").addEventListener("change", function(){
    const d = data[this.value];
    if(!d) return;

    document.getElementById("classField").value = d.classType;
    document.getElementById("dateField").value = d.date;
    document.getElementById("timeField").value = d.time;
    document.getElementById("locationField").value = d.location;
});

load();

</script>

</body>
</html>
